name: pg_management
description: "A comprehensive PG (Paying Guest) management application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # UI & Utilities
  intl: ^0.19.0
  open_filex: ^4.4.0
  
  # External Integrations
  url_launcher: ^6.3.1
  excel: ^4.0.6
  file_picker: ^8.1.4
  
  # Storage
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
